services:
  kafka-1:
    image: confluentinc/cp-kafka:7.7.7
    container_name: nexus-kafka-1
    hostname: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:29093,2@kafka-2:29093"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka-1:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  kafka-2:
    image: confluentinc/cp-kafka:7.7.7
    container_name: nexus-kafka-2
    hostname: kafka-2
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:29093,2@kafka-2:29093"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka-2:9093 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.7.7
    container_name: nexus-kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_started
    volumes:
      - ./init-scripts/kafka/create-topics.sh:/scripts/create-topics.sh:ro
    entrypoint: ["bash", "/scripts/create-topics.sh"]
    networks:
      - nexus-net
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexus-kafka-ui
    hostname: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "nexus"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:9092,kafka-2:9093"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "debezium"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://debezium-connect:8083"
      DYNAMIC_CONFIG_ENABLED: "true"
      SERVER_PORT: 8080
    depends_on:
      kafka-1:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/api/clusters || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.7
    container_name: nexus-schema-registry
    hostname: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka-1:9092,PLAINTEXT://kafka-2:9093"
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: "BACKWARD"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_started
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  postgres:
    image: debezium/postgres:15
    container_name: nexus-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: nexus_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres/00-create-databases.sh:/docker-entrypoint-initdb.d/00-create-databases.sh:ro
      - ./init-scripts/postgres/seed-postgres.sql:/docker-entrypoint-initdb.d/01-seed-postgres.sql:ro
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nexus_db"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    hostname: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost/misc/ping')\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  debezium-connect:
    build:
      context: .
      dockerfile: infrastructure/docker/debezium/Dockerfile
    container_name: nexus-debezium-connect
    hostname: debezium-connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9093"
      GROUP_ID: "nexus-connect-cluster"
      CONFIG_STORAGE_TOPIC: "nexus.connect.configs"
      OFFSET_STORAGE_TOPIC: "nexus.connect.offsets"
      STATUS_STORAGE_TOPIC: "nexus.connect.statuses"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      KEY_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
    depends_on:
      kafka-1:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  debezium-init:
    image: curlimages/curl:latest
    container_name: nexus-debezium-init
    depends_on:
      debezium-connect:
        condition: service_healthy
    volumes:
      - ./init-scripts/debezium/register-connector.sh:/scripts/register-debezium.sh:ro
      - ./infrastructure/debezium/postgres-connector.json:/config/postgres-connector.json:ro
    entrypoint: ["sh", "/scripts/register-debezium.sh"]
    networks:
      - nexus-net
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    hostname: redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  spark-master:
    build:
      context: .
      dockerfile: infrastructure/docker/spark/Dockerfile
    container_name: nexus-spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080
    ports:
      - "8082:8080"
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  spark-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/spark/Dockerfile
    container_name: nexus-spark-worker
    hostname: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: 3
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_WEBUI_PORT: 8081
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  spark-job-transactions:
    build:
      context: .
      dockerfile: infrastructure/docker/spark/Dockerfile
    container_name: nexus-spark-job-transactions
    hostname: spark-job-transactions
    depends_on:
      debezium-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    volumes:
      - ./src:/opt/nexus/src:ro
    environment:
      PYTHONPATH: /opt/nexus/src
      SPARK_MASTER_URL: spark://spark-master:7077
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    entrypoint:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --name
      - nexus-transactions
      - --total-executor-cores
      - "1"
      - --executor-cores
      - "1"
      - --executor-memory
      - 512M
      - --conf
      - spark.ui.enabled=false
      - --conf
      - spark.driver.bindAddress=0.0.0.0
      - --conf
      - spark.driver.host=spark-job-transactions
      - --conf
      - spark.sql.avro.schemaRegistryUrl=http://schema-registry:8081
      - --conf
      - spark.redis.host=redis
      - --conf
      - spark.redis.port=6379
      - --conf
      - spark.streaming.stopGracefullyOnShutdown=true
      - /opt/nexus/src/streaming/jobs/transaction_analytics.py
    networks:
      - nexus-net
    restart: unless-stopped

  spark-job-infrastructure:
    build:
      context: .
      dockerfile: infrastructure/docker/spark/Dockerfile
    container_name: nexus-spark-job-infrastructure
    hostname: spark-job-infrastructure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    volumes:
      - ./src:/opt/nexus/src:ro
    environment:
      PYTHONPATH: /opt/nexus/src
      SPARK_MASTER_URL: spark://spark-master:7077
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    entrypoint:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --name
      - nexus-infrastructure
      - --total-executor-cores
      - "1"
      - --executor-cores
      - "1"
      - --executor-memory
      - 512M
      - --conf
      - spark.ui.enabled=false
      - --conf
      - spark.driver.bindAddress=0.0.0.0
      - --conf
      - spark.driver.host=spark-job-infrastructure
      - --conf
      - spark.sql.avro.schemaRegistryUrl=http://schema-registry:8081
      - --conf
      - spark.redis.host=redis
      - --conf
      - spark.redis.port=6379
      - --conf
      - spark.streaming.stopGracefullyOnShutdown=true
      - /opt/nexus/src/streaming/jobs/infrastructure_analytics.py
    networks:
      - nexus-net
    restart: unless-stopped

  spark-job-derived:
    build:
      context: .
      dockerfile: infrastructure/docker/spark/Dockerfile
    container_name: nexus-spark-job-derived
    hostname: spark-job-derived
    depends_on:
      debezium-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    volumes:
      - ./src:/opt/nexus/src:ro
    environment:
      PYTHONPATH: /opt/nexus/src
      SPARK_MASTER_URL: spark://spark-master:7077
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    entrypoint:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --name
      - nexus-derived
      - --total-executor-cores
      - "1"
      - --executor-cores
      - "1"
      - --executor-memory
      - 512M
      - --conf
      - spark.ui.enabled=false
      - --conf
      - spark.driver.bindAddress=0.0.0.0
      - --conf
      - spark.driver.host=spark-job-derived
      - --conf
      - spark.sql.avro.schemaRegistryUrl=http://schema-registry:8081
      - --conf
      - spark.redis.host=redis
      - --conf
      - spark.redis.port=6379
      - --conf
      - spark.streaming.stopGracefullyOnShutdown=true
      - /opt/nexus/src/streaming/jobs/derived_analytics.py
    networks:
      - nexus-net
    restart: unless-stopped

  nexus-api:
    build:
      context: .
      dockerfile: infrastructure/docker/api/Dockerfile
    container_name: nexus-api
    hostname: nexus-api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - ./src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  nexus-net:
    driver: bridge
    name: nexus-net

volumes:
  kafka-1-data:
  kafka-2-data:
  postgres-data:
  redis-data:
  pgadmin-data:
